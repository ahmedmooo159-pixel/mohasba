<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إنشاء حساب جديد — منصة محاسبتك</title>
  <meta name="description" content="أنشئ حسابك في منصة محاسبتك لطلاب كلية التجارة شعبة حسابات" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body class="login-body">

  <div class="login-container" style="max-width: 480px;">

    <!-- Header -->
    <div class="login-header">
      <div class="login-logo">م</div>
      <h1 class="login-title">إنشاء حساب جديد</h1>
      <p class="login-subtitle">سجّل بياناتك وابدأ رحلتك مع منصة محاسبتك.</p>
    </div>

    <!-- Register Form -->
    <form class="login-form" id="registerForm" novalidate>

      <!-- Full Name -->
      <div class="form-group">
        <label for="nameInput" class="form-label">الاسم الكامل <span style="color:var(--color-error)">*</span></label>
        <input
          type="text"
          id="nameInput"
          class="form-input"
          placeholder=" اكتب اسمك يا بشمحاسب"
          required
          autofocus
          autocomplete="name"
        />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="emailInput" class="form-label">البريد الإلكتروني <span style="color:var(--color-error)">*</span></label>
        <input
          type="email"
          id="emailInput"
          class="form-input"
          placeholder="اكتب ايميلك هنا"
          required
          autocomplete="email"
        />
      </div>

      <!-- Academic Year -->
      <div class="form-group">
        <label for="yearSelect" class="form-label">الفرقة الدراسية <span style="color:var(--color-error)">*</span></label>
        <select id="yearSelect" class="form-select" required>
          <option value="" disabled selected>اختر الفرقة...</option>
          <option value="1">الفرقة الأولى</option>
          <option value="2">الفرقة الثانية</option>
          <option value="3">الفرقة الثالثة</option>
          <option value="4">الفرقة الرابعة</option>
          <option value="5">دراسات عليا  </option>
          <option value="6">دراسات عليا فشخ </option>
        </select>
      </div>

      <!-- Section -->
      <div class="form-group">
        <label for="sectionSelect" class="form-label">الشعبة <span style="color:var(--color-error)">*</span></label>
        <select id="sectionSelect" class="form-select" required>
          <option value="" disabled selected>اختر الشعبة...</option>
          <option value="حسابات">حسابات</option>
          <!-- <option value="إدارة أعمال">إدارة أعمال</option>
          <option value="اقتصاد">اقتصاد</option>
          <option value="إحصاء">إحصاء</option> -->
        </select>
      </div>

      <div class="form-divider">بيانات الدخول</div>

      <!-- Password -->
      <div class="form-group">
        <label for="passwordInput" class="form-label">كلمة المرور <span style="color:var(--color-error)">*</span></label>
        <input
          type="password"
          id="passwordInput"
          class="form-input"
          placeholder="6 أحرف على الأقل"
          required
          autocomplete="new-password"
          minlength="6"
        />
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPasswordInput" class="form-label">تأكيد كلمة المرور <span style="color:var(--color-error)">*</span></label>
        <input
          type="password"
          id="confirmPasswordInput"
          class="form-input"
          placeholder="أعد كتابة كلمة المرور"
          required
          autocomplete="new-password"
        />
      </div>

      <!-- Error Message -->
      <div id="errorMsg" class="error-message" aria-live="polite"></div>

      <!-- Submit -->
      <button type="submit" class="login-btn" id="submitBtn">
        <span class="btn-text">إنشاء الحساب</span>
        <div class="spinner" aria-hidden="true"></div>
      </button>

    </form>

    <!-- Footer: go to login -->
    <div class="login-footer">
      عندك حساب بالفعل؟ <a href="login.html">سجل الدخول</a>
    </div>

  </div>

  <!-- Scripts -->
  <script src="../js/api/config.js"></script>
  <script src="../js/api/apiClient.js"></script>
  <script src="../js/pages/register.page.js"></script>
</body>
</html>

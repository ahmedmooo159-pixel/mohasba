<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إدارة الطلاب — منصة محاسبتك</title>
  <link rel="stylesheet" href="../../css/base.css"/>
  <link rel="stylesheet" href="../../css/admin.css"/>
</head>
<body class="admin-body">

  <div class="admin-shell">
    <main class="admin-main">

      <div class="admin-page-header">
        <div>
          <h1 class="admin-page-title">الطلاب المسجلون</h1>
          <p class="admin-page-subtitle">عرض بيانات جميع الطلاب المسجلين في المنصة.</p>
        </div>
      </div>

      <!-- Filter -->
      <div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap">
        <input type="search" id="searchInput" class="form-input" placeholder="ابحث بالاسم أو البريد..." style="max-width:300px"/>
        <select id="filterYear" class="form-select" style="max-width:200px">
          <option value="">كل الفرق</option>
          <option value="1">الفرقة الأولى</option>
          <option value="2">الفرقة الثانية</option>
          <option value="3">الفرقة الثالثة</option>
          <option value="4">الفرقة الرابعة</option>
        </select>
      </div>

      <div class="admin-card">
        <div class="admin-card-header">
          <h2 class="admin-card-title">قائمة الطلاب</h2>
          <span id="studentCount" style="font-size:var(--text-sm);color:var(--color-text-secondary)"></span>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>#</th>
                <th>الاسم</th>
                <th>البريد الإلكتروني</th>
                <th>الفرقة</th>
                <th>الشعبة</th>
                <th>تاريخ التسجيل</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="studentsTbody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="../../js/api/apiClient.js"></script>
  <script src="../../js/pages/admin.js"></script>
  <script>
    if (!Admin.guard()) throw new Error('Unauthorized');
    Admin.renderSidebar('admin-students');

    // Mock student data — in Sprint 9 يتعوض بـ API حقيقي
    const MOCK_STUDENTS = [
      { id: 1, name: 'أحمد محمود إبراهيم',  email: 'ahmed@example.com',   year: '2', section: 'حسابات',    joinDate: '2026-01-15' },
      { id: 2, name: 'فاطمة علي حسن',       email: 'fatma@example.com',   year: '3', section: 'حسابات',    joinDate: '2026-01-20' },
      { id: 3, name: 'محمد أسامة عبدالله',  email: 'mohamed@example.com', year: '1', section: 'إدارة أعمال', joinDate: '2026-02-01' },
      { id: 4, name: 'ياسمين خالد عمر',     email: 'yasmin@example.com',  year: '4', section: 'حسابات',    joinDate: '2026-02-10' },
      { id: 5, name: 'عمر صلاح الدين',      email: 'omar@example.com',    year: '2', section: 'اقتصاد',    joinDate: '2026-03-05' },
    ];

    const yearLabels = { '1': 'الفرقة الأولى', '2': 'الفرقة الثانية', '3': 'الفرقة الثالثة', '4': 'الفرقة الرابعة' };

    function renderTable(students) {
      const tbody = document.getElementById('studentsTbody');
      document.getElementById('studentCount').textContent = `(${students.length} طالب)`;

      if (!students.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:var(--space-6);color:var(--color-text-muted)">لا توجد نتائج.</td></tr>';
        return;
      }

      tbody.innerHTML = students.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>
            <div style="display:flex;align-items:center;gap:var(--space-2)">
              <div style="width:32px;height:32px;border-radius:var(--radius-full);background:var(--color-primary-100);color:var(--color-primary-700);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--text-sm);flex-shrink:0">
                ${s.name.charAt(0)}
              </div>
              <strong>${s.name}</strong>
            </div>
          </td>
          <td style="font-size:var(--text-sm)">${s.email}</td>
          <td><span class="admin-badge theory">${yearLabels[s.year] || s.year}</span></td>
          <td>${s.section}</td>
          <td style="font-size:var(--text-sm);color:var(--color-text-secondary)">${s.joinDate}</td>
          <td class="tbl-actions">
            <button class="tbl-btn delete" onclick="removeStudent(${s.id})">حذف</button>
          </td>
        </tr>
      `).join('');
    }

    let students = [...MOCK_STUDENTS];
    renderTable(students);

    function removeStudent(id) {
      if (!confirm('هل أنت متأكد من حذف هذا الطالب؟')) return;
      students = students.filter(s => s.id !== id);
      applyFilters();
    }

    function applyFilters() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const year   = document.getElementById('filterYear').value;
      const filtered = students.filter(s =>
        (!search || s.name.includes(search) || s.email.includes(search)) &&
        (!year   || s.year === year)
      );
      renderTable(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('filterYear').addEventListener('change', applyFilters);
  </script>
</body>
</html>
